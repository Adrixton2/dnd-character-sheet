<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kael Velosombrío - Ficha RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">
    
    <!-- Fuentes de Google: Cinzel (Fantasía/Títulos) e Inter (Lectura) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            overflow-x: hidden; 
            /* Fondo estilo obsidiana oscura con ligero viñeteado */
            background: radial-gradient(circle at center, #1f2937 0%, #0f172a 80%, #020617 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            line-height: 1.45;
            text-rendering: optimizeLegibility;
        }

        .font-fantasy { font-family: 'Cinzel', serif; }

        /* Paneles estilo interfaz RPG */
        .rpg-panel {
            background: linear-gradient(145deg, rgba(31,41,55,0.9) 0%, rgba(17,24,39,0.95) 100%);
            border: 1px solid #374151;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 0 16px rgba(0,0,0,0.38), 0 6px 16px rgba(0,0,0,0.24);
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        .rpg-panel-header {
            background: linear-gradient(90deg, rgba(88,28,135,0.4) 0%, transparent 100%);
            border-bottom: 1px solid rgba(139,92,246,0.3);
            border-left: 2px solid #a855f7;
            min-width: 0;
        }

        /* Animaciones suaves */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-attack {
            animation: fadeSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(234, 179, 8, 0.6); }
            50% { box-shadow: 0 0 25px rgba(234, 179, 8, 1); }
        }
        .animate-pulse-glow { animation: pulseGlow 2s infinite; }

        /* Barras de desplazamiento customizadas */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Eliminar flechas de inputs numéricos en todos los navegadores y arreglar padding */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            padding: 0; 
        }

        /* Estilo para las barras de salud de videojuegos */
        .health-bar-container {
            background-color: #111827;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
            border: 1px solid #374151;
            position: relative;
            overflow: hidden;
            border-radius: 9999px;
            height: 24px; /* Barra un poco más gruesa para poder arrastrarla bien */
            width: 100%;
            cursor: pointer;
            touch-action: none; /* Previene scroll en móviles al arrastrar */
        }
        
        .glass-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            pointer-events: none;
            z-index: 10;
        }

        .shadow-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }

        .bottom-nav {
            box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.38);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-button { min-height: 56px; }
        .bottom-nav-button svg { width: 20px; height: 20px; }

        .tab-viewport { overscroll-behavior: contain; touch-action: pan-y; }
        .tab-section { animation: fadeSlideUp 0.24s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-viewport[data-active-tab="combat"] [data-tab]:not([data-tab="combat"]),
        .tab-viewport[data-active-tab="character"] [data-tab]:not([data-tab="character"]),
        .tab-viewport[data-active-tab="grimoire"] [data-tab]:not([data-tab="grimoire"]),
        .tab-viewport[data-active-tab="inventory"] [data-tab]:not([data-tab="inventory"]) { display: none; }

        *, *::before, *::after { box-sizing: border-box; }
        button, input, select, textarea { min-width: 0; max-width: 100%; font: inherit; }
        button { touch-action: manipulation; }
        button svg { display: block; flex: 0 0 auto; }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 2px solid rgba(168,85,247,0.85);
            outline-offset: 2px;
        }

        .app-shell { padding-bottom: max(5rem, calc(4rem + env(safe-area-inset-bottom))); }
        .app-frame, .tab-viewport, .tab-section, .rpg-panel { min-width: 0; }
        .tab-viewport { padding-inline: 2px; scrollbar-gutter: stable; scroll-padding-block: 0.25rem 1rem; }
        .tab-section h2, .tab-section h3, .tab-section p { overflow-wrap: anywhere; }
        .tab-section h2, .tab-section h3 { line-height: 1.25; }
        .tab-section > .rpg-panel, .tab-section > .grid { min-width: 0; }
        .tab-viewport[data-active-tab="character"] .character-tab-intro { margin-top: 0 !important; }
        .tab-viewport .rpg-panel { padding: 1rem !important; }
        .tab-viewport .rpg-panel-header { padding-block: 0.875rem !important; }
        .tab-viewport .rpg-panel-header > h2,
        .tab-viewport h2.rpg-panel-header { margin-block: 0 !important; }
        .tab-viewport [class*="bg-gray-900/40"],
        .tab-viewport [class*="bg-gradient-to-r from-gray-900"],
        .tab-viewport [class*="from-fuchsia-900/30"] { padding-block: 0.875rem; }
        .tab-viewport p { line-height: 1.5 !important; }
        .tab-viewport input:not([type="checkbox"]),
        .tab-viewport select { line-height: 1.25; }
        .rpg-panel-header { gap: 0.75rem; }
        .bottom-nav-button { min-width: 0; }
        .bottom-nav-button span { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: normal; line-height: 1.1; text-align: center; }
        .bottom-nav-button { padding-inline: 0.5rem; }
        .rpg-panel-header > button,
        .rpg-panel-header > div > button {
            min-height: 2.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .grimoire-toolbar { align-items: center; }
        .grimoire-summary { gap: 0.625rem !important; }
        .inventory-item-row { gap: 0.75rem; }
        .inventory-item-controls { flex: 0 0 auto; }
        .fixed.inset-0 .flex.justify-end { align-items: center; }

        @media (min-width: 768px) {
            .tab-viewport[data-active-tab="combat"] .space-y-6 > [data-tab="combat"] + [data-tab="combat"] { margin-top: 1rem !important; }
            .grimoire-summary { justify-content: flex-end; }
        }

        @media (max-width: 767px) {
            .app-shell { padding: 0.75rem !important; padding-bottom: max(5.5rem, calc(4.5rem + env(safe-area-inset-bottom))) !important; }
            .app-frame { gap: 0.75rem !important; }
            .character-header { align-items: stretch !important; padding: 1rem !important; }
            .character-identity { min-width: 0; }
            .character-identity > input { font-size: 1.75rem !important; }
            .character-meta { gap: 0.5rem !important; line-height: 1.5; }
            .character-meta input { min-width: 5rem; flex: 1 1 7rem; }
            .character-meta span { min-width: 0; }
            .tab-viewport { padding-bottom: 0.75rem; }
            .tab-viewport .max-h-60, .tab-viewport .max-h-96 { max-height: none !important; overflow: visible !important; }
            .rpg-panel { padding: 0.875rem !important; }
            .rpg-panel-header { flex-wrap: wrap; align-items: flex-start !important; }
            .rpg-panel-header > h2 { flex: 1 1 10rem; }
            .rpg-panel-header h2 { white-space: normal !important; }
            .rpg-panel-header > button, .rpg-panel-header > div { max-width: 100%; }
            .rpg-panel-header > div { flex-wrap: wrap; }
            [data-tab] .flex.justify-between { gap: 0.5rem; }
            [data-tab="inventory"] .group.flex.justify-between { flex-wrap: wrap; }
            [data-tab="inventory"] .group .flex-1 { min-width: 0; }
            .inventory-item-row { flex-wrap: wrap; }
            .inventory-item-controls { margin-left: auto; }
            .tab-viewport button { min-height: 2.25rem; }
            .tab-viewport .w-5, .tab-viewport .w-6, .tab-viewport .w-7 { min-width: 2.25rem; min-height: 2.25rem; }
            .bottom-nav-button { min-height: 3.5rem !important; }
            .fixed.inset-0 { padding: 0.75rem !important; }
            .fixed.inset-0 > .rpg-panel { max-height: calc(100dvh - 1.5rem); overflow-y: auto; padding: 1rem !important; }
            .fixed.inset-0 .grid.grid-cols-2 { grid-template-columns: minmax(0, 1fr) !important; }
            .fixed.inset-0 .flex.justify-end { flex-wrap: wrap; gap: 0.75rem; }
            .fixed.inset-0 .flex.space-x-4, .fixed.inset-0 .flex.gap-6 { flex-wrap: wrap; gap: 0.75rem; }
        }

        @media (hover: none) {
            [data-tab="inventory"] .group .opacity-0 { opacity: 1; }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .app-shell { padding: 1rem !important; padding-bottom: 5.5rem !important; }
            .app-frame { max-width: 100% !important; }
            .character-header { padding: 1.125rem !important; }
            .tab-viewport { padding-inline: 0.25rem; }
            .rpg-panel-header { flex-wrap: wrap; }
            .rpg-panel-header > h2 { min-width: 0; }
        }

        @media (pointer: coarse) and (min-width: 768px) {
            .tab-viewport button { min-height: 2.25rem; }
            .tab-viewport .w-5, .tab-viewport .w-6, .tab-viewport .w-7 { min-width: 2.25rem; min-height: 2.25rem; }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .app-shell { padding-top: 0.5rem !important; padding-bottom: 4.5rem !important; }
            .app-frame { gap: 0.5rem !important; }
            .character-header { flex-direction: row !important; padding: 0.75rem 1rem !important; }
            .character-identity > input { font-size: 1.5rem !important; }
            .character-meta { margin-top: 0.25rem !important; }
            .bottom-nav-button { min-height: 2.75rem !important; flex-direction: row !important; gap: 0.375rem !important; }
            .bottom-nav-button span { white-space: nowrap; font-size: 0.5625rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function useLocalStorage(key, initialValue) {
            const [value, setValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });
            useEffect(() => {
                try {
                    window.localStorage.setItem(key, JSON.stringify(value));
                } catch (error) {}
            }, [key, value]);
            return [value, setValue];
        }

        function KaelCharacterSheet() {
            /* ================= ESTADOS ================= */
            const [charInfo, setCharInfo] = useLocalStorage('kael_char_info', {
                name: "Kael Velosombrío", race: "Shadar-kai", cls: "Pícaro (Soulknife)"
            });
            const [level, setLevel] = useLocalStorage('kael_level', "5"); 
            const PROF_BONUS = Math.ceil((Number(level) || 1) / 4) + 1;

            const [inspiration, setInspiration] = useLocalStorage('kael_inspiration', false);

            const [hp, setHp] = useLocalStorage('kael_hp_v3', { current: "34", max: "34", temp: "0" });
            const [hitDice, setHitDice] = useLocalStorage('kael_hit_dice_v2', { current: "5", type: "d8" });
            
            const [speed, setSpeed] = useLocalStorage('kael_speed', "30");
            const [size, setSize] = useLocalStorage('kael_size', "Mediano");
            const [initBonus, setInitBonus] = useLocalStorage('kael_init_bonus_v2', "0");
            const [deathSaves, setDeathSaves] = useLocalStorage('kael_deathsaves', { successes: 0, failures: 0 });

            const [stats, setStats] = useLocalStorage('kael_stats_v2', {
                fue: "12", des: "20", con: "16", int: "12", sab: "15", car: "15"
            });
            const [savingThrows, setSavingThrows] = useLocalStorage('kael_saving_throws', ['des', 'int']);

            const [proficiencies, setProficiencies] = useLocalStorage('kael_proficiencies', {
                expertise: ['sigilo', 'percepcion'],
                proficient: ['acrobacias', 'juego_de_manos', 'engano', 'persuasion']
            });

            const [resources, setResources] = useLocalStorage('kael_resources', [
                { id: 'res_psi', name: 'Dados Psiónicos', current: 6, max: 6, type: 'd8' },
                { id: 'res_luck', name: 'Suerte (Lucky)', current: 3, max: 3, type: '' },
                { id: 'res_ki', name: 'Puntos de Ki', current: 0, max: 0, type: '' },
                { id: 'res_sup', name: 'Dados de Superioridad', current: 0, max: 0, type: 'd8' }
            ]);

            const [currency, setCurrency] = useLocalStorage('kael_currency_v2', { po: "191", pp: "0", pc: "0" });

            const [inventory, setInventory] = useLocalStorage('kael_inventory_v3', [
                { id: 'i1', name: 'Antorchas', qty: 5, desc: 'Luz brillante a 20 pies, tenue a 20 más.' },
                { id: 'i2', name: 'Cuerda de Cáñamo', qty: 1, desc: '50 pies de longitud.' },
                { id: 'i3', name: 'Raciones', qty: 10, desc: 'Comida para 1 día.' },
                { id: 'i5', name: 'Poción Azul', qty: 19, desc: 'Efecto desconocido/Mágico.' },
                { id: 'i6', name: 'Poción de Vida', qty: 1, desc: 'Cura 2d4+2 PV.' }
            ]);
            
            const [armors, setArmors] = useLocalStorage('kael_armors_v1', [
                { id: 'arm_1', name: "Armadura de Cuero Tachonado", type: "light", ac: 12, stealthDis: false, equipped: true }
            ]);
            const [tools, setTools] = useLocalStorage('kael_tools_v1', [
                { id: 'tool_1', name: "Herramientas de Ladrón", desc: "Permite abrir cerraduras y desarmar trampas si se tiene competencia." }
            ]);
            const [miscAc, setMiscAc] = useLocalStorage('kael_misc_ac', "0");

            const [weapons, setWeapons] = useLocalStorage('kael_weapons_v3', [
                { id: 'wp_soul', name: 'Cuchillas Psíquicas', attacks: [
                    { name: "Cuchilla Principal", atk: "+8", dmg: "1d6 + 5 Psíquico", notes: "Sutil, arrojadiza (60'). Desaparece al impactar." },
                    { name: "Cuchilla Secundaria", atk: "+8", dmg: "1d4 + 5 Psíquico", notes: "Acción bonus. Requiere mano libre." }
                ]},
                { id: 'wp_snk', name: 'Ataque Furtivo', attacks: [
                    { name: "Daño Furtivo", atk: "Auto", dmg: "+3d6 Extra", notes: "1 vez/turno con Ventaja o aliado a 5 pies." }
                ]}
            ]);
            const [selectedWeaponId, setSelectedWeaponId] = useState('wp_soul');
            const [activeTab, setActiveTab] = useState("character");
            const tabScrollRef = useRef(null);
            const tabScrollPositions = useRef({ combat: 0, character: 0, grimoire: 0, inventory: 0 });
            const tabTouchStart = useRef(null);

            const [traits, setTraits] = useLocalStorage('kael_traits', [
                { title: "Esquiva Asombrosa (Uncanny Dodge)", desc: "Reacción para dividir daño a la mitad." },
                { title: "Telepatía Psiónica", desc: "1 milla de distancia, dura 1d8 horas." },
                { title: "Habilidad Agudizada", desc: "Suma 1d8 a pruebas de habilidad falladas." }
            ]);

            const [feats, setFeats] = useLocalStorage('kael_feats', [
                { title: "Afortunado (Lucky)", desc: "Tienes 3 puntos de suerte. Puedes gastar uno para tirar un d20 adicional en ataques, pruebas o salvaciones." }
            ]);

            const [spells, setSpells] = useLocalStorage('kael_spells_v3', []);
            const [spellLimits, setSpellLimits] = useLocalStorage('kael_spell_limits', { known: "", prepared: "" });
            const [spellSlots, setSpellSlots] = useLocalStorage('kael_spell_slots', {
                1: { current: 0, max: 0 }, 2: { current: 0, max: 0 }, 3: { current: 0, max: 0 },
                4: { current: 0, max: 0 }, 5: { current: 0, max: 0 }, 6: { current: 0, max: 0 },
                7: { current: 0, max: 0 }, 8: { current: 0, max: 0 }, 9: { current: 0, max: 0 }
            });

            const [sessionNotes, setSessionNotes] = useLocalStorage('kael_session_notes_v2', [
                { id: 'note_' + Date.now(), date: new Date().toLocaleDateString(), text: "Comienza la aventura..." }
            ]);

            // ESTADOS PARA MODALES
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: "", onConfirm: null, isAlert: false });
            const [skillModal, setSkillModal] = useState({ isOpen: false, skillKey: null, skillName: "" });
            const [addModal, setAddModal] = useState({ isOpen: false, type: null, data: {} }); 
            const [notesModalOpen, setNotesModalOpen] = useState(false);

            // Ref para la barra de vida táctil
            const hpBarRef = useRef(null);
            const [isDraggingHp, setIsDraggingHp] = useState(false);

            useEffect(() => {
                setTraits(prev => {
                    if (!prev.some(t => t.title.includes("Trance"))) {
                        return [...prev, 
                            { title: "Visión en la Oscuridad", desc: "Luz tenue a 60 pies como brillante." },
                            { title: "Trance Shadar-kai", desc: "Meditas 4 horas. Ganas 2 competencias." },
                            { title: "Bendición Reina Cuervo", desc: "Bonus: TP 30 pies y resistencia a daño." }
                        ];
                    }
                    return prev;
                });
            }, []);

            const handleNumInput = (value) => value === "" ? "" : String(Number(value));

            const selectTab = (tab) => {
                if (tabScrollRef.current) tabScrollPositions.current[activeTab] = tabScrollRef.current.scrollTop;
                setActiveTab(tab);
                requestAnimationFrame(() => {
                    if (tabScrollRef.current) tabScrollRef.current.scrollTop = tabScrollPositions.current[tab] || 0;
                });
            };

            const handleTabTouchStart = (event) => {
                if (event.touches.length !== 1 || event.target.closest('input, textarea, select, button, [data-no-tab-swipe]')) {
                    tabTouchStart.current = null;
                    return;
                }
                const touch = event.touches[0];
                tabTouchStart.current = { x: touch.clientX, y: touch.clientY };
            };

            const handleTabTouchEnd = (event) => {
                if (!tabTouchStart.current || event.changedTouches.length !== 1) return;

                const touch = event.changedTouches[0];
                const deltaX = touch.clientX - tabTouchStart.current.x;
                const deltaY = touch.clientY - tabTouchStart.current.y;
                tabTouchStart.current = null;

                if (Math.abs(deltaX) < 56 || Math.abs(deltaX) <= Math.abs(deltaY)) return;

                const tabs = ['character', 'combat', 'grimoire', 'inventory'];
                const currentIndex = tabs.indexOf(activeTab);
                const nextIndex = currentIndex + (deltaX < 0 ? 1 : -1);
                if (nextIndex >= 0 && nextIndex < tabs.length) selectTab(tabs[nextIndex]);
            };

            const getModNum = (scoreStr) => {
                const score = Number(scoreStr) || 0;
                return Math.floor((score - 10) / 2);
            };
            
            const formatMod = (mod) => (mod >= 0 ? `+${mod}` : mod);
            
            const getPassivePerception = () => {
                const isExp = proficiencies.expertise.includes('percepcion');
                const isProf = proficiencies.proficient.includes('percepcion');
                const baseMod = getModNum(stats.sab);
                const totalMod = baseMod + (isExp ? PROF_BONUS * 2 : isProf ? PROF_BONUS : 0);
                return 10 + totalMod;
            };

            const calculateAC = () => {
                const equippedArmor = armors.find(a => a.equipped && a.type !== 'shield');
                const equippedShield = armors.find(a => a.equipped && a.type === 'shield');
                
                let baseAc = 10;
                let dexLimit = Infinity;
                
                if (equippedArmor) {
                    baseAc = Number(equippedArmor.ac) || 0;
                    if (equippedArmor.type === 'medium') dexLimit = 2;
                    if (equippedArmor.type === 'heavy') dexLimit = 0;
                }
                
                let dexMod = getModNum(stats.des);
                dexMod = Math.min(dexMod, dexLimit);
                
                let shieldBonus = 0;
                if (equippedShield) {
                    shieldBonus = Number(equippedShield.ac) || 2;
                }
                
                const misc = Number(miscAc) || 0;
                return baseAc + dexMod + shieldBonus + misc;
            };

            const isStealthDisadvantaged = armors.some(a => a.equipped && a.stealthDis);

            // Funciones de interacción rápida
            const toggleSavingThrow = (statKey) => {
                setSavingThrows(prev => prev.includes(statKey) ? prev.filter(s => s !== statKey) : [...prev, statKey]);
            };

            const toggleArmorEquip = (id) => {
                setArmors(prev => prev.map(a => {
                    if (a.id === id) {
                        const targetArmor = armors.find(arm => arm.id === id);
                        if (!targetArmor.equipped && targetArmor.type !== 'shield') {
                            return { ...a, equipped: true };
                        }
                        return { ...a, equipped: !a.equipped };
                    }
                    if (armors.find(arm => arm.id === id && !arm.equipped && arm.type !== 'shield')) {
                         if (a.type !== 'shield') return { ...a, equipped: false };
                    }
                    return a;
                }));
            };

            const updateSkillProficiency = (level) => {
                const { skillKey } = skillModal;
                setProficiencies(prev => {
                    const newExp = prev.expertise.filter(k => k !== skillKey);
                    const newProf = prev.proficient.filter(k => k !== skillKey);
                    if (level === 'expertise') newExp.push(skillKey);
                    if (level === 'proficient') newProf.push(skillKey);
                    return { expertise: newExp, proficient: newProf };
                });
                setSkillModal({ isOpen: false, skillKey: null, skillName: "" });
            };

            const confirmDelete = (message, action) => setConfirmDialog({ isOpen: true, message, onConfirm: action, isAlert: false });
            const showAlert = (message) => setConfirmDialog({ isOpen: true, message, onConfirm: null, isAlert: true });
            const closeConfirm = () => setConfirmDialog({ isOpen: false, message: "", onConfirm: null, isAlert: false });

            const addCurrency = (type, amount) => {
                setCurrency(prev => {
                    let po = Number(prev.po) || 0;
                    let pp = Number(prev.pp) || 0;
                    let pc = Number(prev.pc) || 0;
                    if (type === 'pc') pc += amount;
                    if (type === 'pp') pp += amount;
                    if (type === 'po') po += amount;
                    while (pc >= 10) { pc -= 10; pp += 1; }
                    while (pp >= 10) { pp -= 10; po += 1; }
                    while (pc < 0 && pp > 0) { pp -= 1; pc += 10; }
                    while (pp < 0 && po > 0) { po -= 1; pp += 10; }
                    if (pc < 0) pc = 0; if (pp < 0) pp = 0; if (po < 0) po = 0;
                    return { po: String(po), pp: String(pp), pc: String(pc) };
                });

                                                <div className="w-2/3">
                                                    <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Daño (Ej. 1d6+5 Psíq)</label>
                                                    <input type="text" value={addModal.data.dmg || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, dmg: e.target.value}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-purple-500 outline-none font-mono" />
                                                </div>
                                            </div>
                                        )}

                                        {(addModal.type === 'attack' || addModal.type === 'spell') && (
                                            <div>
                                                <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Notas / Efectos Adicionales</label>
                                                <textarea value={addModal.data.notes || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, notes: e.target.value}})} className="w-full bg-gray-950 border border-gray-700 rounded p-3 text-sm text-white focus:border-purple-500 outline-none h-28 resize-y leading-relaxed" />
                                            </div>
                                        )}

                                        {addModal.type === 'spell' && (
                                            <>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Nivel (1-9)</label>
                                                        <input type="number" min="1" max="9" value={addModal.data.level || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, level: handleNumInput(e.target.value)}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-fuchsia-500 outline-none text-center font-mono" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Alcance</label>
                                                        <input type="text" placeholder="Ej. 60 pies" value={addModal.data.range || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, range: e.target.value}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-fuchsia-500 outline-none" />
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Forma de Área</label>
                                                        <input type="text" placeholder="Ej. Esfera, Cono..." value={addModal.data.shape || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, shape: e.target.value}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-fuchsia-500 outline-none" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Tamaño Área</label>
                                                        <input type="text" placeholder="Ej. 20 pies" value={addModal.data.size || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, size: e.target.value}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-fuchsia-500 outline-none" />
                                                    </div>
                                                </div>
                                                <div className="space-y-3 mt-2 bg-gray-900/50 p-4 rounded border border-gray-800">
                                                    <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1 block font-fantasy border-b border-gray-700 pb-1">Componentes Requeridos</label>
                                                    <div className="flex gap-6">
                                                        <label className="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer font-bold">
                                                            <input type="checkbox" checked={addModal.data.compV || false} onChange={e => setAddModal({...addModal, data: {...addModal.data, compV: e.target.checked}})} className="w-4 h-4 accent-fuchsia-600 bg-gray-950 border-gray-700 rounded" />
                                                            <span>V <span className="text-[10px] font-normal text-gray-500">(Verbal)</span></span>
                                                        </label>
                                                        <label className="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer font-bold">
                                                            <input type="checkbox" checked={addModal.data.compS || false} onChange={e => setAddModal({...addModal, data: {...addModal.data, compS: e.target.checked}})} className="w-4 h-4 accent-fuchsia-600 bg-gray-950 border-gray-700 rounded" />
                                                            <span>S <span className="text-[10px] font-normal text-gray-500">(Gestos)</span></span>
                                                        </label>
                                                        <label className="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer font-bold">
                                                            <input type="checkbox" checked={addModal.data.compM || false} onChange={e => setAddModal({...addModal, data: {...addModal.data, compM: e.target.checked}})} className="w-4 h-4 accent-fuchsia-600 bg-gray-950 border-gray-700 rounded" />
                                                            <span>M <span className="text-[10px] font-normal text-gray-500">(Objeto)</span></span>
                                                        </label>
                                                    </div>
                                                    {addModal.data.compM && (
                                                        <input type="text" placeholder="Especificar material (Ej. polvo de diamante)" value={addModal.data.compMDesc || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, compMDesc: e.target.value}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-fuchsia-500 outline-none text-sm mt-2" />
                                                    )}
                                                </div>
                                            </>
                                        )}

                                        {addModal.type === 'resource' && (
                                            <div className="flex gap-4">
                                                <div className="w-1/2">
                                                    <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Usos Máximos</label>
                                                    <input type="number" value={addModal.data.max || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, max: handleNumInput(e.target.value)}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-purple-500 outline-none text-center font-mono" />
                                                </div>
                                                <div className="w-1/2">
                                                    <label className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1.5 block font-fantasy">Tipo de Dado</label>
                                                    <input type="text" placeholder="Ej. d8 (Opcional)" value={addModal.data.dice || ''} onChange={e => setAddModal({...addModal, data: {...addModal.data, dice: e.target.value}})} className="w-full bg-gray-950 border border-gray-700 rounded p-2.5 text-white focus:border-purple-500 outline-none text-center font-mono" />
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                    <div className="flex justify-end space-x-4 mt-8 pt-5 border-t border-gray-700">
                                        <button onClick={() => setAddModal({isOpen:false, type:null, data:{}})} className="px-5 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white rounded font-bold transition-colors font-fantasy uppercase tracking-wider text-xs">Cancelar</button>
                                        <button onClick={handleAddSubmit} className="px-6 py-2 bg-purple-700 hover:bg-purple-600 border border-purple-500 text-white rounded font-bold shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all transform hover:scale-105 font-fantasy uppercase tracking-wider text-xs">Registrar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KaelCharacterSheet />);
    </script>
    <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
}
</script>
</body>
</html>
