<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kael Velosombrío - Ficha RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">
    
    <!-- Fuentes de Google: Cinzel (Fantasía/Títulos) e Inter (Lectura) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            overflow: hidden;
            /* Fondo estilo obsidiana oscura con ligero viñeteado */
            background: radial-gradient(circle at center, #1f2937 0%, #0f172a 80%, #020617 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            line-height: 1.45;
            text-rendering: optimizeLegibility;
        }

        .font-fantasy { font-family: 'Cinzel', serif; }

        /* Paneles estilo interfaz RPG */
        .rpg-panel {
            background: linear-gradient(145deg, rgba(31,41,55,0.9) 0%, rgba(17,24,39,0.95) 100%);
            border: 1px solid #374151;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset 0 0 16px rgba(0,0,0,0.38), 0 6px 16px rgba(0,0,0,0.24);
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        .rpg-panel-header {
            background: linear-gradient(90deg, rgba(88,28,135,0.4) 0%, transparent 100%);
            border-bottom: 1px solid rgba(139,92,246,0.3);
            border-left: 2px solid #a855f7;
            min-width: 0;
        }

        /* Animaciones suaves */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes tabExitToLeft {
            to { opacity: 0; transform: translateX(-24px); }
        }
        @keyframes tabExitToRight {
            to { opacity: 0; transform: translateX(24px); }
        }
        .animate-attack {
            animation: fadeSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(234, 179, 8, 0.6); }
            50% { box-shadow: 0 0 25px rgba(234, 179, 8, 1); }
        }
        .animate-pulse-glow { animation: pulseGlow 2s infinite; }

        /* Barras de desplazamiento customizadas */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Eliminar flechas de inputs numéricos en todos los navegadores y arreglar padding */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            padding: 0; 
        }

        /* Estilo para las barras de salud de videojuegos */
        .health-bar-container {
            background-color: #111827;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
            border: 1px solid #374151;
            position: relative;
            overflow: hidden;
            border-radius: 9999px;
            height: 24px; /* Barra un poco más gruesa para poder arrastrarla bien */
            width: 100%;
            cursor: pointer;
            touch-action: none; /* Previene scroll en móviles al arrastrar */
        }
        
        .glass-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            pointer-events: none;
            z-index: 10;
        }

        .shadow-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }

        .bottom-nav {
            box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.38);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav-button { min-height: 56px; }
        .bottom-nav-button svg { width: 20px; height: 20px; }

        .tab-viewport { overscroll-behavior: contain; touch-action: pan-y; overflow-x: hidden !important; }
        .tab-content-wrapper {
            width: 100%;
            overflow: hidden;
            will-change: transform, opacity;
        }
        .tab-content-wrapper.is-exiting[data-direction="left"] { animation: tabExitToLeft 0.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .tab-content-wrapper.is-exiting[data-direction="right"] { animation: tabExitToRight 0.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .tab-content-wrapper.is-entering[data-direction="left"] { opacity: 0; transform: translateX(24px); }
        .tab-content-wrapper.is-entering[data-direction="right"] { opacity: 0; transform: translateX(-24px); }
        .tab-content-wrapper.is-entering.is-enter-active {
            opacity: 1;
            transform: translateX(0);
            transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        /* La vista se anima en una sola capa; las animaciones locales esperan a que termine el cambio de pestaña. */
        .tab-content-wrapper.is-exiting .animate-attack,
        .tab-content-wrapper.is-entering .animate-attack {
            animation: none !important;
            opacity: 1;
        }
        .tab-viewport[data-active-tab="combat"] [data-tab]:not([data-tab="combat"]),
        .tab-viewport[data-active-tab="character"] [data-tab]:not([data-tab="character"]),
        .tab-viewport[data-active-tab="grimoire"] [data-tab]:not([data-tab="grimoire"]),
        .tab-viewport[data-active-tab="inventory"] [data-tab]:not([data-tab="inventory"]) { display: none; }
        .combat-mode-panel { display: none; }
        .tab-viewport[data-combat-mode="true"] [data-tab="combat"]:not(.combat-mode-panel) { display: none; }
        .tab-viewport[data-combat-mode="true"] .combat-mode-panel { display: block !important; }
        .combat-mode-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 0.75rem; }
        .combat-mode-stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.625rem; }
        .combat-mode-list { display: grid; gap: 0.625rem; }

        *, *::before, *::after { box-sizing: border-box; }
        button, input, select, textarea { min-width: 0; max-width: 100%; font: inherit; }
        button { touch-action: manipulation; }
        button svg { display: block; flex: 0 0 auto; }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 2px solid rgba(168,85,247,0.85);
            outline-offset: 2px;
        }

        .app-shell { padding-bottom: max(5rem, calc(4rem + env(safe-area-inset-bottom))); }
        .app-frame, .tab-viewport, .tab-section, .rpg-panel { min-width: 0; }
        .tab-viewport { padding-inline: 2px; scrollbar-gutter: stable; scroll-padding-block: 0.25rem 1rem; }
        .tab-section h2, .tab-section h3, .tab-section p { overflow-wrap: anywhere; }
        .tab-section h2, .tab-section h3 { line-height: 1.25; }
        .tab-section > .rpg-panel, .tab-section > .grid { min-width: 0; }
        .tab-viewport[data-active-tab="character"] .character-tab-intro { margin-top: 0 !important; }
        .tab-viewport .rpg-panel { padding: 1rem !important; }
        .tab-viewport .rpg-panel-header { padding-block: 0.875rem !important; }
        .tab-viewport .rpg-panel-header > h2,
        .tab-viewport h2.rpg-panel-header { margin-block: 0 !important; }
        .tab-viewport [class*="bg-gray-900/40"],
        .tab-viewport [class*="bg-gradient-to-r from-gray-900"],
        .tab-viewport [class*="from-fuchsia-900/30"] { padding-block: 0.875rem; }
        .tab-viewport p { line-height: 1.5 !important; }
        .tab-viewport input:not([type="checkbox"]),
        .tab-viewport select { line-height: 1.25; }
        .rpg-panel-header { gap: 0.75rem; }
        .bottom-nav-button { min-width: 0; }
        .bottom-nav-button span { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: normal; line-height: 1.1; text-align: center; }
        .bottom-nav-button { padding-inline: 0.5rem; }
        .rpg-panel-header > button,
        .rpg-panel-header > div > button {
            min-height: 2.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .grimoire-toolbar { align-items: center; }
        .grimoire-summary { gap: 0.625rem !important; }
        .inventory-item-row { gap: 0.75rem; }
        .inventory-item-controls { flex: 0 0 auto; }
        .fixed.inset-0 .flex.justify-end { align-items: center; }

        @media (min-width: 768px) {
            .tab-viewport[data-active-tab="combat"] .space-y-6 > [data-tab="combat"] + [data-tab="combat"] { margin-top: 1rem !important; }
            .grimoire-summary { justify-content: flex-end; }
            .combat-mode-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .combat-mode-primary { grid-column: 1 / -1; }
        }

        @media (max-width: 767px) {
            .app-shell { padding: 0.75rem !important; padding-bottom: max(5.5rem, calc(4.5rem + env(safe-area-inset-bottom))) !important; }
            .app-frame { gap: 0.75rem !important; }
            .character-header { align-items: stretch !important; padding: 1rem !important; }
            .character-identity { min-width: 0; }
            .character-identity > input { font-size: 1.75rem !important; }
            .character-meta { gap: 0.5rem !important; line-height: 1.5; }
            .character-meta input { min-width: 5rem; flex: 1 1 7rem; }
            .character-meta span { min-width: 0; }
            .tab-viewport { padding-bottom: 0.75rem; }
            .tab-viewport .max-h-60, .tab-viewport .max-h-96 { max-height: none !important; overflow: visible !important; }
            .rpg-panel { padding: 0.875rem !important; }
            .rpg-panel-header { flex-wrap: wrap; align-items: flex-start !important; }
            .rpg-panel-header > h2 { flex: 1 1 10rem; }
            .rpg-panel-header h2 { white-space: normal !important; }
            .rpg-panel-header > button, .rpg-panel-header > div { max-width: 100%; }
            .rpg-panel-header > div { flex-wrap: wrap; }
            [data-tab] .flex.justify-between { gap: 0.5rem; }
            [data-tab="inventory"] .group.flex.justify-between { flex-wrap: wrap; }
            [data-tab="inventory"] .group .flex-1 { min-width: 0; }
            .inventory-item-row { flex-wrap: wrap; }
            .inventory-item-controls { margin-left: auto; }
            .tab-viewport button { min-height: 2.25rem; }
            .tab-viewport .w-5, .tab-viewport .w-6, .tab-viewport .w-7 { min-width: 2.25rem; min-height: 2.25rem; }
            .bottom-nav-button { min-height: 3.5rem !important; }
            .fixed.inset-0 { padding: 0.75rem !important; }
            .fixed.inset-0 > .rpg-panel { max-height: calc(100dvh - 1.5rem); overflow-y: auto; padding: 1rem !important; }
            .fixed.inset-0 .grid.grid-cols-2 { grid-template-columns: minmax(0, 1fr) !important; }
            .fixed.inset-0 .flex.justify-end { flex-wrap: wrap; gap: 0.75rem; }
            .fixed.inset-0 .flex.space-x-4, .fixed.inset-0 .flex.gap-6 { flex-wrap: wrap; gap: 0.75rem; }
        }

        @media (hover: none) {
            [data-tab="inventory"] .group .opacity-0 { opacity: 1; }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .app-shell { padding: 1rem !important; padding-bottom: 5.5rem !important; }
            .app-frame { max-width: 100% !important; }
            .character-header { padding: 1.125rem !important; }
            .tab-viewport { padding-inline: 0.25rem; }
            .rpg-panel-header { flex-wrap: wrap; }
            .rpg-panel-header > h2 { min-width: 0; }
        }

        @media (pointer: coarse) and (min-width: 768px) {
            .tab-viewport button { min-height: 2.25rem; }
            .tab-viewport .w-5, .tab-viewport .w-6, .tab-viewport .w-7 { min-width: 2.25rem; min-height: 2.25rem; }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .app-shell { padding-top: 0.5rem !important; padding-bottom: 4.5rem !important; }
            .app-frame { gap: 0.5rem !important; }
            .character-header { flex-direction: row !important; padding: 0.75rem 1rem !important; }
            .character-identity > input { font-size: 1.5rem !important; }
            .character-meta { margin-top: 0.25rem !important; }
            .bottom-nav-button { min-height: 2.75rem !important; flex-direction: row !important; gap: 0.375rem !important; }
            .bottom-nav-button span { white-space: nowrap; font-size: 0.5625rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .tab-content-wrapper, .animate-attack { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CHARACTER_MANAGER_KEY = 'dnd_character_manager_v1';
        const CHARACTER_MANAGER_VERSION = 1;
        const CHARACTER_EXPORT_FORMAT = 'dnd-character-sheet';
        const CHARACTER_EXPORT_SCHEMA_VERSION = 1;
        const MAX_IMPORT_FILE_SIZE = 1024 * 1024;
        const MAX_PORTRAIT_FILE_SIZE = 5 * 1024 * 1024;
        const MAX_PORTRAIT_DATA_URL_LENGTH = 1500000;

        const createCharacterId = () => window.crypto?.randomUUID?.() || `character_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        const cloneData = (value) => JSON.parse(JSON.stringify(value));
        const createBlankSpellSlots = () => Object.fromEntries([1, 2, 3, 4, 5, 6, 7, 8, 9].map(level => [level, { current: 0, max: 0 }]));
        const createDefaultGrimoireConfig = () => ({ useKnownLimit: false, knownLimit: '', usePrepared: false, preparedLimit: '', useCantripLimit: false, cantripLimit: '', usePactMagic: false, pactSlots: { current: 0, max: 0, level: 1 } });

        const createBlankCharacterData = () => ({
            charInfo: { name: '', race: '', cls: '' }, level: '1', inspiration: false,
            hp: { current: '', max: '', temp: '0' }, hitDice: { current: '', type: '' },
            speed: '', size: '', initBonus: '0', deathSaves: { successes: 0, failures: 0 },
            stats: { fue: '', des: '', con: '', int: '', sab: '', car: '' }, savingThrows: [],
            proficiencies: { expertise: [], proficient: [] }, resources: [], currency: { po: '0', pp: '0', pc: '0' },
            inventory: [], armors: [], tools: [], miscAc: '0', weapons: [], traits: [], feats: [],
            spells: [], spellLimits: { known: '', prepared: '' }, spellSlots: createBlankSpellSlots(), grimoireConfig: createDefaultGrimoireConfig(), conditions: [], sessionNotes: []
        });

        const legacyStorageKeys = {
            charInfo: 'kael_char_info', level: 'kael_level', inspiration: 'kael_inspiration', hp: 'kael_hp_v3',
            hitDice: 'kael_hit_dice_v2', speed: 'kael_speed', size: 'kael_size', initBonus: 'kael_init_bonus_v2',
            deathSaves: 'kael_deathsaves', stats: 'kael_stats_v2', savingThrows: 'kael_saving_throws',
            proficiencies: 'kael_proficiencies', resources: 'kael_resources', currency: 'kael_currency_v2',
            inventory: 'kael_inventory_v3', armors: 'kael_armors_v1', tools: 'kael_tools_v1', miscAc: 'kael_misc_ac',
            weapons: 'kael_weapons_v3', traits: 'kael_traits', feats: 'kael_feats', spells: 'kael_spells_v3',
            spellLimits: 'kael_spell_limits', spellSlots: 'kael_spell_slots', sessionNotes: 'kael_session_notes_v2'
        };

        const legacyDefaults = () => ({
            charInfo: { name: 'Kael Velosombrío', race: 'Shadar-kai', cls: 'Pícaro (Soulknife)' }, level: '5', inspiration: false,
            hp: { current: '34', max: '34', temp: '0' }, hitDice: { current: '5', type: 'd8' }, speed: '30', size: 'Mediano', initBonus: '0', deathSaves: { successes: 0, failures: 0 },
            stats: { fue: '12', des: '20', con: '16', int: '12', sab: '15', car: '15' }, savingThrows: ['des', 'int'],
            proficiencies: { expertise: ['sigilo', 'percepcion'], proficient: ['acrobacias', 'juego_de_manos', 'engano', 'persuasion'] },
            resources: [
                { id: 'res_psi', name: 'Dados Psiónicos', current: 6, max: 6, type: 'd8' },
                { id: 'res_luck', name: 'Suerte (Lucky)', current: 3, max: 3, type: '' },
                { id: 'res_ki', name: 'Puntos de Ki', current: 0, max: 0, type: '' },
                { id: 'res_sup', name: 'Dados de Superioridad', current: 0, max: 0, type: 'd8' }
            ],
            currency: { po: '191', pp: '0', pc: '0' },
            inventory: [
                { id: 'i1', name: 'Antorchas', qty: 5, desc: 'Luz brillante a 20 pies, tenue a 20 más.' },
                { id: 'i2', name: 'Cuerda de Cáñamo', qty: 1, desc: '50 pies de longitud.' },
                { id: 'i3', name: 'Raciones', qty: 10, desc: 'Comida para 1 día.' },
                { id: 'i5', name: 'Poción Azul', qty: 19, desc: 'Efecto desconocido/Mágico.' },
                { id: 'i6', name: 'Poción de Vida', qty: 1, desc: 'Cura 2d4+2 PV.' }
            ],
            armors: [{ id: 'arm_1', name: 'Armadura de Cuero Tachonado', type: 'light', ac: 12, stealthDis: false, equipped: true }],
            tools: [{ id: 'tool_1', name: 'Herramientas de Ladrón', desc: 'Permite abrir cerraduras y desarmar trampas si se tiene competencia.' }], miscAc: '0',
            weapons: [
                { id: 'wp_soul', name: 'Cuchillas Psíquicas', attacks: [
                    { name: 'Cuchilla Principal', atk: '+8', dmg: '1d6 + 5 Psíquico', notes: 'Sutil, arrojadiza (60\'). Desaparece al impactar.' },
                    { name: 'Cuchilla Secundaria', atk: '+8', dmg: '1d4 + 5 Psíquico', notes: 'Acción bonus. Requiere mano libre.' }
                ]},
                { id: 'wp_snk', name: 'Ataque Furtivo', attacks: [{ name: 'Daño Furtivo', atk: 'Auto', dmg: '+3d6 Extra', notes: '1 vez/turno con Ventaja o aliado a 5 pies.' }] }
            ],
            traits: [
                { title: 'Esquiva Asombrosa (Uncanny Dodge)', desc: 'Reacción para dividir daño a la mitad.' },
                { title: 'Telepatía Psiónica', desc: '1 milla de distancia, dura 1d8 horas.' },
                { title: 'Habilidad Agudizada', desc: 'Suma 1d8 a pruebas de habilidad falladas.' }
            ],
            feats: [{ title: 'Afortunado (Lucky)', desc: 'Tienes 3 puntos de suerte. Puedes gastar uno para tirar un d20 adicional en ataques, pruebas o salvaciones.' }],
            spells: [], spellLimits: { known: '', prepared: '' }, spellSlots: createBlankSpellSlots(),
            sessionNotes: [{ id: `note_${Date.now()}`, date: new Date().toLocaleDateString(), text: 'Comienza la aventura...' }]
        });

        const readLegacyCharacterData = () => {
            const defaults = legacyDefaults();
            return Object.keys(legacyStorageKeys).reduce((data, field) => {
                try {
                    const stored = window.localStorage.getItem(legacyStorageKeys[field]);
                    data[field] = stored ? JSON.parse(stored) : defaults[field];
                } catch (error) {
                    data[field] = defaults[field];
                }
                return data;
            }, {});
        };

        const createCharacterRecord = (data, name, portrait = '') => {
            const now = new Date().toISOString();
            return {
                meta: { id: createCharacterId(), name: name || data.charInfo?.name || 'Personaje sin nombre', createdAt: now, updatedAt: now, portrait },
                data: cloneData(data)
            };
        };

        const isRecord = (value) => value && typeof value === 'object' && !Array.isArray(value);
        const normalizeSpell = (spell) => ({ id: spell.id || `sp_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`, name: spell.name || '', level: Math.max(0, Math.min(9, Number(spell.level) || 0)), school: spell.school || '', castingTime: spell.castingTime || '', duration: spell.duration || '', range: spell.range || '', areaShape: spell.areaShape || (spell.shape && spell.shape !== '-' ? spell.shape : 'ninguna'), areaSize: spell.areaSize || spell.size || '', length: spell.length || '', width: spell.width || '', customArea: spell.customArea || '', compV: !!spell.compV, compS: !!spell.compS, compM: !!spell.compM, compMDesc: spell.compMDesc || '', concentration: !!spell.concentration, ritual: !!spell.ritual, attackBonus: spell.attackBonus || '', savingThrow: !!spell.savingThrow, savingAbility: spell.savingAbility || '', damageHealing: spell.damageHealing || '', description: spell.description || '', notes: spell.notes || '', known: spell.known !== false, prepared: Number(spell.level) === 0 ? false : !!spell.prepared, favorite: !!spell.favorite });
        const normalizeResource = (resource) => {
            const suggestedRest = resource.recoveryRest || (resource.recovery === 'both' ? 'short' : resource.recovery === 'short' || resource.recovery === 'long' || resource.recovery === 'manual' ? resource.recovery : 'manual');
            return { ...resource, recoveryRest: suggestedRest === 'both' ? 'short' : suggestedRest, recoveryMode: ['full','fixed','half','manual'].includes(resource.recoveryMode) ? resource.recoveryMode : 'full', recoveryAmount: Number(resource.recoveryAmount) || 0 };
        };
        const normalizeGrimoireData = (data) => ({ ...data, resources: Array.isArray(data.resources) ? data.resources.map(normalizeResource) : [], spells: Array.isArray(data.spells) ? data.spells.map(normalizeSpell) : [], conditions: Array.isArray(data.conditions) ? data.conditions : [], grimoireConfig: { ...createDefaultGrimoireConfig(), ...(isRecord(data.grimoireConfig) ? data.grimoireConfig : {}), pactSlots: { ...createDefaultGrimoireConfig().pactSlots, ...(isRecord(data.grimoireConfig?.pactSlots) ? data.grimoireConfig.pactSlots : {}) } } });
        const calculateRestPreview = (restType, characterData, spentHitDice = 0, manualHealing = 0) => {
            const data = normalizeGrimoireData(cloneData(characterData));
            const changes = [], unchanged = [];
            const recoverResource = resource => {
                const eligible = restType === 'long' ? ['short','long'].includes(resource.recoveryRest) : resource.recoveryRest === 'short';
                if (!eligible || resource.recoveryMode === 'manual') { unchanged.push(resource.name); return resource; }
                const max = Number(resource.max) || 0, current = Number(resource.current) || 0;
                const gain = resource.recoveryMode === 'fixed' ? Number(resource.recoveryAmount) || 0 : resource.recoveryMode === 'half' ? (max > 0 ? Math.max(1, Math.floor(max / 2)) : 0) : max;
                const next = Math.min(max, resource.recoveryMode === 'full' ? max : current + gain);
                if (next !== current) changes.push(`${resource.name}: ${current}/${max} -> ${next}/${max}`); else unchanged.push(resource.name);
                return { ...resource, current: next };

                const touch = event.touches[0];
                tabTouchStart.current = { x: touch.clientX, y: touch.clientY };
            };

            const handleTabTouchEnd = (event) => {
                if (!tabTouchStart.current || event.changedTouches.length !== 1) return;

                const touch = event.changedTouches[0];
                const deltaX = touch.clientX - tabTouchStart.current.x;
                const deltaY = touch.clientY - tabTouchStart.current.y;
                tabTouchStart.current = null;

                if (Math.abs(deltaX) < 56 || Math.abs(deltaX) <= Math.abs(deltaY)) return;

                const currentIndex = TAB_ORDER.indexOf(activeTab);
                const nextIndex = currentIndex + (deltaX < 0 ? 1 : -1);
                if (nextIndex >= 0 && nextIndex < TAB_ORDER.length) requestTabChange(TAB_ORDER[nextIndex]);
            };

            const getModNum = (scoreStr) => {
                const score = Number(scoreStr) || 0;
                return Math.floor((score - 10) / 2);
            };
            
            const formatMod = (mod) => (mod >= 0 ? `+${mod}` : mod);
            
            const getPassivePerception = () => {
                const isExp = proficiencies.expertise.includes('percepcion');
                const isProf = proficiencies.proficient.includes('percepcion');
                const baseMod = getModNum(stats.sab);
                const totalMod = baseMod + (isExp ? PROF_BONUS * 2 : isProf ? PROF_BONUS : 0);
                return 10 + totalMod;
            };

            const calculateBaseAC = () => {
                const equippedArmor = armors.find(a => a.equipped && a.type !== 'shield');
                const equippedShield = armors.find(a => a.equipped && a.type === 'shield');
                
                let baseAc = 10;
                let dexLimit = Infinity;
                
                if (equippedArmor) {
                    baseAc = Number(equippedArmor.ac) || 0;
                    if (equippedArmor.type === 'medium') dexLimit = 2;
                    if (equippedArmor.type === 'heavy') dexLimit = 0;
                }
                
                let dexMod = getModNum(stats.des);
                dexMod = Math.min(dexMod, dexLimit);
                
                let shieldBonus = 0;
                if (equippedShield) {
                    shieldBonus = Number(equippedShield.ac) || 2;
                }
                
                return baseAc + dexMod + shieldBonus;
            };

            const calculateAC = () => calculateBaseAC() + (Number(miscAc) || 0);

            const isStealthDisadvantaged = armors.some(a => a.equipped && a.stealthDis);

            // Funciones de interacción rápida
            const toggleSavingThrow = (statKey) => {
                setSavingThrows(prev => prev.includes(statKey) ? prev.filter(s => s !== statKey) : [...prev, statKey]);
            };

            const toggleArmorEquip = (id) => {
                setArmors(prev => prev.map(a => {
                    if (a.id === id) {
                        const targetArmor = armors.find(arm => arm.id === id);
                        if (!targetArmor.equipped && targetArmor.type !== 'shield') {
                            return { ...a, equipped: true };
                        }
                        return { ...a, equipped: !a.equipped };
                    }
                    if (armors.find(arm => arm.id === id && !arm.equipped && arm.type !== 'shield')) {
                         if (a.type !== 'shield') return { ...a, equipped: false };
                    }
                    return a;
                }));
            };

            const updateSkillProficiency = (level) => {
                const { skillKey } = skillModal;
                setProficiencies(prev => {
                    const newExp = prev.expertise.filter(k => k !== skillKey);
                    const newProf = prev.proficient.filter(k => k !== skillKey);
                    if (level === 'expertise') newExp.push(skillKey);
                    if (level === 'proficient') newProf.push(skillKey);
                    return { expertise: newExp, proficient: newProf };
                });
                setSkillModal({ isOpen: false, skillKey: null, skillName: "" });
            };

            const confirmDelete = (message, action) => setConfirmDialog({ isOpen: true, message, onConfirm: action, isAlert: false });
            const showAlert = (message) => setConfirmDialog({ isOpen: true, message, onConfirm: null, isAlert: true });
            const closeConfirm = () => setConfirmDialog({ isOpen: false, message: "", onConfirm: null, isAlert: false });

            const characterList = Object.values(manager.characters).sort((a, b) => b.meta.updatedAt.localeCompare(a.meta.updatedAt));
            const selectManagedCharacter = (id) => {
                selectCharacter(id);
                setCharacterManagerOpen(false);
                setNotesModalOpen(false);
                setSkillModal({ isOpen: false, skillKey: null, skillName: '' });
                setAddModal({ isOpen: false, type: null, data: {} });
            };
            const createManagedCharacter = () => {
                createCharacter();
                setCharacterManagerOpen(false);
            };
            const deleteManagedCharacter = (id) => {
                if (characterList.length <= 1) {
                    showAlert('No puedes eliminar el único personaje. Crea otro personaje antes de borrar esta ficha.');
                    return;
                }
                const name = manager.characters[id]?.meta.name || 'este personaje';
                confirmDelete(`¿Eliminar definitivamente a ${name}? Esta acción no se puede deshacer.`, () => deleteCharacter(id));
            };
            const buildActiveCharacterExport = () => {
                const payload = createExportPayload(activeCharacter);
                const content = JSON.stringify(payload, null, 2);
                const fileName = createSafeExportFileName(activeCharacter.meta.name);
                return { content, fileName, blob: new Blob([content], { type: 'application/json' }) };
            };
            const exportActiveCharacter = () => {
                const { blob, fileName } = buildActiveCharacterExport();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                link.remove();
                requestAnimationFrame(() => URL.revokeObjectURL(url));
            };
            const supportsFileSharing = (() => {
                try {
                    return typeof navigator.share === 'function' && typeof navigator.canShare === 'function' && typeof File !== 'undefined' && navigator.canShare({ files: [new File(['{}'], 'personaje.json', { type: 'application/json' })] });
                } catch (error) {
                    return false;
                }
            })();
            const shareActiveCharacter = async () => {
                const { content, fileName } = buildActiveCharacterExport();
                const file = new File([content], fileName, { type: 'application/json' });
                if (!navigator.canShare({ files: [file] })) {
                    exportActiveCharacter();
                    return;
                }
                try {
                    await navigator.share({ title: activeCharacter.meta.name || 'Personaje D&D', files: [file] });
                } catch (error) {
                    if (error?.name !== 'AbortError') showAlert('No se pudo compartir el personaje.');
                }
            };
            const handleImportFile = (event) => {
                const file = event.target.files?.[0];
                event.target.value = '';
                if (!file) return;
                if (file.size > MAX_IMPORT_FILE_SIZE) {
                    showAlert('El archivo supera el límite de 1 MB.');
                    return;
                }
                const reader = new FileReader();
                reader.onerror = () => showAlert('No se pudo leer el archivo seleccionado.');
                reader.onload = () => {
                    try {
                        const character = validateImportedCharacter(getImportedCharacter(JSON.parse(reader.result)));
                        setPendingImport(character);
                    } catch (error) {
                        showAlert(error.message || 'El archivo no es válido.');
                    }
                };
                reader.readAsText(file);
            };
            const confirmImportCharacter = () => {
                if (!pendingImport) return;
                importCharacter(pendingImport);
                setPendingImport(null);
                setCharacterManagerOpen(false);
            };
            const handlePortraitFile = async (event) => {
                const file = event.target.files?.[0];
                event.target.value = '';
                if (!file) return;
                const characterId = activeCharacter.meta.id;
                try {
                    const portrait = await resizePortraitFile(file);
                    setPortrait(characterId, portrait);
                } catch (error) {
                    showAlert(error.message || 'No se pudo guardar el retrato.');
                }
            };
            const removePortrait = () => {
                if (!activeCharacter.meta.portrait) return;
                confirmDelete('¿Eliminar el retrato de este personaje?', () => setPortrait(activeCharacter.meta.id, ''));
            };

            const addCurrency = (type, amount) => {
                setCurrency(prev => {
                    let po = Number(prev.po) || 0;
                    let pp = Number(prev.pp) || 0;
                    let pc = Number(prev.pc) || 0;
                    if (type === 'pc') pc += amount;
                    if (type === 'pp') pp += amount;
                    if (type === 'po') po += amount;
                    while (pc >= 10) { pc -= 10; pp += 1; }
                    while (pp >= 10) { pp -= 10; po += 1; }
                    while (pc < 0 && pp > 0) { pp -= 1; pc += 10; }
                    while (pp < 0 && po > 0) { po -= 1; pp += 10; }
                    if (pc < 0) pc = 0; if (pp < 0) pp = 0; if (po < 0) po = 0;
                    return { po: String(po), pp: String(pp), pc: String(pc) };
                });
            };

            const adjustInvQty = (id, delta) => {
                setInventory(prev => prev.map(item => {
                    if (item.id === id) {
                        return { ...item, qty: Math.max(0, (Number(item.qty)||0) + delta) };
                    }
                    return item;
                }));
            };

            const adjustSpellSlot = (lvl, delta) => {
                setSpellSlots(prev => {
                    const current = Number(prev[lvl].current) || 0;
                    const max = Number(prev[lvl].max) || 0;
                    const newCurrent = Math.max(0, Math.min(max, current + delta));
                    return { ...prev, [lvl]: { ...prev[lvl], current: newCurrent } };
                });
            };

            const updateHpFromEvent = (e) => {
                const target = e.currentTarget || hpBarRef.current;
                if (!target) return;
                const rect = target.getBoundingClientRect();
                if (!rect.width) return;
                const clientX = e.clientX;
                let percentage = (clientX - rect.left) / rect.width;
                percentage = Math.max(0, Math.min(1, percentage));
                const newHp = Math.round((Number(hp.max) || 1) * percentage);
                setHp(p => ({ ...p, current: String(newHp) }));
            };

            const handleHpPointerDown = (e) => {
                setIsDraggingHp(true);
                e.currentTarget.setPointerCapture(e.pointerId);
                updateHpFromEvent(e);
            };

            const handleHpPointerMove = (e) => {
                if (isDraggingHp) {
                    updateHpFromEvent(e);
                }
            };

            const handleHpPointerUp = (e) => {
                setIsDraggingHp(false);
                if (e.currentTarget.hasPointerCapture?.(e.pointerId)) e.currentTarget.releasePointerCapture(e.pointerId);
            };

            const handleAddSubmit = () => {
                const { type, data } = addModal;
                if (type === 'item' && data.name) setInventory([...inventory, { id: 'inv_' + Date.now(), name: data.name, qty: Number(data.qty) || 1, desc: data.desc || "" }]);
                if (type === 'armor' && data.name) setArmors([...armors, { id: 'arm_' + Date.now(), name: data.name, type: data.type || 'light', ac: Number(data.ac) || 11, stealthDis: data.stealthDis || false, equipped: false }]);
                if (type === 'tool' && data.name) setTools([...tools, { id: 'tool_' + Date.now(), name: data.name, desc: data.desc || "" }]);
                if (type === 'trait' && data.title) setTraits([...traits, { title: data.title, desc: data.desc }]);
                if (type === 'feat' && data.title) setFeats([...feats, { title: data.title, desc: data.desc }]);
                if (type === 'weapon' && data.name) {
                    const newWp = { id: 'wp_' + Date.now(), name: data.name, attacks: [] };
                    setWeapons([...weapons, newWp]);
                    setSelectedWeaponId(newWp.id);
                }
                if (type === 'attack' && data.name && selectedWeaponId) {
                    setWeapons(weapons.map(w => w.id === selectedWeaponId ? 
                        { ...w, attacks: [...w.attacks, { name: data.name, atk: data.atk, dmg: data.dmg, notes: data.notes }] } : w
                    ));
                }
                if (type === 'resource' && data.name) {
                    setResources([...resources, { id: 'res_' + Date.now(), name: data.name, current: Number(data.max)||0, max: Number(data.max)||0, type: data.dice || '', recoveryRest: data.recoveryRest || 'manual', recoveryMode: data.recoveryMode || 'full', recoveryAmount: Number(data.recoveryAmount) || 0 }]);
                }
                if (type === 'spell' && data.name) {
                    const level = Math.max(0, Math.min(9, Number(data.level)));
                    const knownCount = spells.filter(spell => spell.level > 0 && spell.known).length;
                    const cantripCount = spells.filter(spell => spell.level === 0 && spell.known).length;
                    if ((level === 0 && grimoireConfig.useCantripLimit && cantripCount >= (Number(grimoireConfig.cantripLimit) || 0)) || (level > 0 && grimoireConfig.useKnownLimit && knownCount >= (Number(grimoireConfig.knownLimit) || 0))) {
                        showAlert('Has alcanzado el límite configurado para ese tipo de conjuro.');
                    } else setSpells([...spells, normalizeSpell({ ...data, id: 'sp_' + Date.now(), level, known: true, prepared: false })]);
                }
                setAddModal({ isOpen: false, type: null, data: {} });
            };

            const toggleSpellPreparation = (sp) => {
                if (!grimoireConfig.usePrepared || sp.level === 0) return;
                if (!sp.prepared) {
                    const maxPrep = Number(grimoireConfig.preparedLimit) || 0;
                    const currentPrep = spells.filter(s => s.level > 0 && s.prepared).length;
                    if (currentPrep >= maxPrep) {
                        showAlert(`Has alcanzado tu límite máximo de ${maxPrep} hechizos preparados.`);
                        return;
                    }
                }
                setSpells(spells.map(s => s.id === sp.id ? {...s, prepared: !s.prepared} : s));
            };
            const toggleSpellKnown = (sp) => {
                if (sp.level === 0 || !grimoireConfig.useKnownLimit) return;
                if (!sp.known && knownSpellCount >= (Number(grimoireConfig.knownLimit) || 0)) { showAlert('Has alcanzado el límite de conjuros conocidos.'); return; }
                setSpells(spells.map(item => item.id === sp.id ? { ...item, known: !item.known, prepared: item.known ? false : item.prepared } : item));
            };

            const castWithSlot = (slotLevel, pact = false) => {
                if (!castSpell) return;
                if (castSpell.level === 0) { setCastSpell(null); return; }
                if (pact) setGrimoireConfig(prev => ({ ...prev, pactSlots: { ...prev.pactSlots, current: Math.max(0, Number(prev.pactSlots.current) - 1) } }));
                else setSpellSlots(prev => ({ ...prev, [slotLevel]: { ...prev[slotLevel], current: Math.max(0, Number(prev[slotLevel].current) - 1) } }));
                setCastSpell(null);
            };

            // Cálculos para la barra de vida de videojuego
            const curHp = Number(hp.current) || 0;
            const maxHp = Number(hp.max) || 1;
            const tmpHp = Number(hp.temp) || 0;
            
            const hpPercent = Math.min(100, Math.max(0, (curHp / maxHp) * 100));
            const tempHpPercent = Math.min(100, Math.max(0, (tmpHp / maxHp) * 100));

            const SKILLS = [
                { key: 'acrobacias', name: 'Acrobacias', stat: 'des' }, { key: 'arcanos', name: 'Arcano', stat: 'int' },
                { key: 'atletismo', name: 'Atletismo', stat: 'fue' }, { key: 'engano', name: 'Engaño', stat: 'car' },
                { key: 'historia', name: 'Historia', stat: 'int' }, { key: 'interpretacion', name: 'Interpretación', stat: 'car' },
                { key: 'intimidacion', name: 'Intimidación', stat: 'car' }, { key: 'investigacion', name: 'Investigación', stat: 'int' },
                { key: 'juego_de_manos', name: 'Juego de Manos', stat: 'des' }, { key: 'medicina', name: 'Medicina', stat: 'sab' },
                { key: 'naturaleza', name: 'Naturaleza', stat: 'int' }, { key: 'percepcion', name: 'Percepción', stat: 'sab' },
                { key: 'perspicacia', name: 'Perspicacia', stat: 'sab' }, { key: 'persuasion', name: 'Persuasión', stat: 'car' },
                { key: 'religion', name: 'Religión', stat: 'int' }, { key: 'sigilo', name: 'Sigilo', stat: 'des' },
                { key: 'supervivencia', name: 'Supervivencia', stat: 'sab' }, { key: 'trato_con_animales', name: 'Trato con Animales', stat: 'sab' },
            ];
            useEffect(() => { setRestModalOpen(false); setRestType(null); }, [manager.activeCharacterId]);
            const restPreview = restType ? calculateRestPreview(restType, activeCharacter.data, restSpentDice, restHealing) : null;
            const confirmRest = () => {
                if (!restPreview) return;
                updateActiveData(restPreview.data);
                setRestModalOpen(false); setRestType(null); setRestSpentDice(0); setRestHealing(0);
            };
            const knownSpellCount = spells.filter(spell => spell.level > 0 && spell.known).length;
            const preparedSpellCount = spells.filter(spell => spell.level > 0 && spell.prepared).length;
            const cantripCount = spells.filter(spell => spell.level === 0 && spell.known).length;
            const availableSpells = spells.filter(spell => spell.level === 0 || (grimoireConfig.usePrepared ? spell.prepared : grimoireConfig.useKnownLimit ? spell.known : true));
            const tacticalWeapons = (() => {
                const favorites = weapons.filter(weapon => weapon.favorite);
                return favorites.length ? favorites : weapons.slice(0, 3);
            })();
            const tacticalSpells = (() => {
                if (grimoireConfig.usePrepared) return spells.filter(spell => spell.prepared);
                const favorites = spells.filter(spell => spell.favorite);
                return favorites.length ? favorites : availableSpells.slice(0, 3);
            })();
            const tacticalResources = resources.filter(resource => Number(resource.max) > 0);
            const combatConditions = ['Derribado', 'Envenenado', 'Asustado', 'Invisible', 'Paralizado', 'Hechizado', 'Agarrado'];
            const renderAcTemporaryControls = () => (
                <div className="mt-2 flex flex-col items-center gap-1 z-10">
                    <span className="text-[10px] text-gray-400 whitespace-nowrap">Base {calculateBaseAC()} · Temporal {formatMod(Number(miscAc) || 0)}</span>
                    <div className="flex items-center justify-center gap-1">
                        <button type="button" aria-label="Reducir modificador temporal de CA" onClick={() => setMiscAc(String((Number(miscAc) || 0) - 1))} className="w-8 h-8 rounded border border-gray-600 bg-gray-800 text-gray-200 hover:border-purple-400">−</button>
                        <input aria-label="Modificador temporal de CA" type="number" value={miscAc} onChange={e => setMiscAc(handleNumInput(e.target.value))} className="w-12 h-8 rounded border border-gray-600 bg-gray-950 text-center text-sm font-bold text-white outline-none focus:border-purple-500" />
                        <button type="button" aria-label="Aumentar modificador temporal de CA" onClick={() => setMiscAc(String((Number(miscAc) || 0) + 1))} className="w-8 h-8 rounded border border-gray-600 bg-gray-800 text-gray-200 hover:border-purple-400">+</button>
                    </div>
                    <button type="button" disabled={(Number(miscAc) || 0) === 0} onClick={() => { if ((Number(miscAc) || 0) !== 0) setMiscAc('0'); }} className="text-[10px] text-purple-300 hover:text-white disabled:text-gray-600 disabled:cursor-not-allowed">Reiniciar</button>
                </div>
            );
            const displayedSpells = (grimoireView === 'available' ? availableSpells : spells).filter(spell => {
                const query = spell.name.toLowerCase().includes(spellSearch.toLowerCase());
                const filter = spellFilter === 'all' || (spellFilter === 'cantrip' && spell.level === 0) || (spellFilter === 'prepared' && spell.prepared) || (spellFilter === 'ritual' && spell.ritual) || (spellFilter === 'concentration' && spell.concentration) || (spellFilter === 'favorite' && spell.favorite) || Number(spellFilter) === spell.level;
                return query && filter;
            }).slice().sort((a, b) => a.level - b.level || a.name.localeCompare(b.name));

            return (
                <div className="app-shell h-[100dvh] overflow-hidden p-2 pb-20 md:p-6 md:pb-24 text-gray-200">
                    <div className="app-frame max-w-5xl h-full mx-auto flex flex-col gap-4">
                        
                        <main ref={tabScrollRef} data-active-tab={activeTab} data-combat-mode={combatMode ? 'true' : 'false'} data-transition-direction={transitionDirection} onScroll={() => { if (tabScrollRef.current) tabScrollPositions.current[activeTab] = tabScrollRef.current.scrollTop; }} onTouchStart={handleTabTouchStart} onTouchEnd={handleTabTouchEnd} onTouchCancel={() => { tabTouchStart.current = null; }} className="tab-viewport flex-1 min-h-0 overflow-y-auto pr-1 pb-4 space-y-6">
                        <div
                            data-direction={transitionDirection}
                            onAnimationEnd={handleTabTransitionEnd}
                            onTransitionEnd={handleTabTransitionEnd}
                            className={`tab-content-wrapper ${transitionPhase === 'exit' ? 'is-exiting' : transitionPhase === 'enter' ? `is-entering ${isEnterActive ? 'is-enter-active' : ''}` : ''}`}
                        >
                        <div data-tab="combat" className="combat-mode-panel tab-section space-y-4">
                            <div className="flex flex-wrap items-center justify-between gap-3 border-b border-purple-900/70 pb-3">
                                <div className="min-w-0">
                                    <p className="font-fantasy text-xs uppercase tracking-widest text-red-300">Modo Combate</p>
                                    <h1 className="font-fantasy text-xl font-bold text-white truncate">{charInfo.name || 'Personaje sin nombre'}</h1>
                                    <p className="text-sm text-purple-300 truncate">{charInfo.cls || 'Clase sin definir'} · Nivel {level || '1'}</p>
                                </div>
                                <button type="button" onClick={() => setCombatMode(false)} className="min-h-11 px-4 py-2 rounded border border-red-700 bg-red-950/40 text-red-100 hover:bg-red-900 text-xs font-fantasy uppercase tracking-wider">
                                    &#10005; Salir del combate
                                </button>
                            </div>

                            <div className="combat-mode-grid">
                                <section className="combat-mode-primary rpg-panel p-4">
                                    <div className="flex flex-wrap items-end justify-between gap-3 mb-3">
                                        <span className="font-fantasy text-red-400 text-sm font-bold uppercase tracking-widest">Vida</span>
                                        <div className="flex items-center gap-1 font-sans">
                                            <input aria-label="Vida actual" type="number" value={hp.current} onChange={e => setHp(p => ({ ...p, current: handleNumInput(e.target.value) }))} className="w-16 bg-transparent text-right text-3xl font-bold text-white outline-none" />
                                            <span className="text-gray-500 text-xl">/</span>
                                            <input aria-label="Vida maxima" type="number" value={hp.max} onChange={e => setHp(p => ({ ...p, max: handleNumInput(e.target.value) }))} className="w-14 bg-transparent text-left text-xl text-gray-300 outline-none border-b border-gray-700 focus:border-red-500" />
                                        </div>
                                    </div>
                                    <div className="health-bar-container" data-no-tab-swipe onPointerDown={handleHpPointerDown} onPointerMove={handleHpPointerMove} onPointerUp={handleHpPointerUp} onPointerCancel={handleHpPointerUp}>
                                        <div className="glass-overlay"></div>
                                        <div className="absolute left-0 top-0 h-full bg-gradient-to-r from-red-800 to-red-500 transition-all duration-75" style={{ width: `${hpPercent}%` }}></div>
                                        {tmpHp > 0 && <div className="absolute left-0 top-0 h-full bg-gradient-to-r from-cyan-600 to-cyan-300 opacity-80 transition-all duration-300 border-r border-white shadow-[0_0_8px_#22d3ee] pointer-events-none" style={{ width: `${tempHpPercent}%` }}></div>}
                                    </div>
                                    <label className="mt-3 flex items-center justify-between gap-3 text-xs font-fantasy uppercase tracking-wider text-cyan-300">
                                        Vida temporal
                                        <input aria-label="Vida temporal" type="number" value={hp.temp || ''} placeholder="0" onChange={e => setHp(p => ({ ...p, temp: handleNumInput(e.target.value) }))} className="w-16 rounded border border-cyan-800 bg-gray-950 px-2 py-2 text-center font-sans font-bold text-cyan-200 outline-none focus:border-cyan-400" />
                                    </label>
                                </section>

                                <section className="rpg-panel p-4">
                                    <h2 className="font-fantasy text-sm font-bold uppercase tracking-widest text-purple-300 mb-3">Defensas</h2>
                                    <div className="combat-mode-stat-grid text-center">
                                        <div className="col-span-2 rounded border border-gray-700 bg-gray-900/70 p-2"><span className="block text-[10px] uppercase tracking-wider text-gray-400">CA</span><strong className="text-3xl text-white">{calculateAC()}</strong>{renderAcTemporaryControls()}</div>

                                            </div>
                                            <label className="block text-sm text-gray-300">Se recupera con<select value={addModal.data.recoveryRest || 'manual'} onChange={e => setAddModal({...addModal, data:{...addModal.data,recoveryRest:e.target.value}})} className="block mt-1 w-full bg-gray-950 border border-gray-700 rounded p-2"><option value="short">Descanso corto (también largo)</option><option value="long">Descanso largo</option><option value="manual">Solo manualmente</option></select></label>
                                            {addModal.data.recoveryRest !== 'manual' && <label className="block text-sm text-gray-300">Cantidad recuperada<select value={addModal.data.recoveryMode || 'full'} onChange={e => setAddModal({...addModal, data:{...addModal.data,recoveryMode:e.target.value}})} className="block mt-1 w-full bg-gray-950 border border-gray-700 rounded p-2"><option value="full">Completa</option><option value="fixed">Cantidad fija</option><option value="half">Mitad</option><option value="manual">Manual</option></select></label>}
                                            </div>
                                        )}

                                    </div>
                                    <div className="flex justify-end space-x-4 mt-8 pt-5 border-t border-gray-700">
                                        <button onClick={() => setAddModal({isOpen:false, type:null, data:{}})} className="px-5 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white rounded font-bold transition-colors font-fantasy uppercase tracking-wider text-xs">Cancelar</button>
                                        <button onClick={handleAddSubmit} className="px-6 py-2 bg-purple-700 hover:bg-purple-600 border border-purple-500 text-white rounded font-bold shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all transform hover:scale-105 font-fantasy uppercase tracking-wider text-xs">Registrar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KaelCharacterSheet />);
    </script>
    <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
}
</script>
</body>
</html>
